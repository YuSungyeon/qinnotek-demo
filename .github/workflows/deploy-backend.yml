name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {} # 수동 실행 허용

env:
  # 저장소 Variable(EC2_HOST)에 Elastic IP를 넣으면 IP 변경 시 코드 수정 불필요
  EC2_HOST: ${{ vars.EC2_HOST }}
  EC2_USER: ubuntu

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build bootJar
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/build/libs/app.jar
          target: /home/ubuntu
          strip_components: 3

      - name: Deploy & restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # SMS 설정을 원격 스크립트로 전달 (Secret/Variable → 서버 env 파일에 주입)
          envs: SMS_ENABLED,SOLAPI_API_KEY,SOLAPI_API_SECRET,SOLAPI_SENDER
          script: |
            set -e
            sudo mv /home/ubuntu/app.jar /opt/photo-submission/app.jar

            # /etc/photo-submission.env 에 SMS 관련 키 upsert (설정된 값이 있을 때만)
            ENV_FILE=/etc/photo-submission.env
            upsert() {
              local key="$1" val="$2"
              [ -z "$val" ] && return 0
              if sudo grep -q "^${key}=" "$ENV_FILE"; then
                sudo sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" | sudo tee -a "$ENV_FILE" >/dev/null
              fi
            }
            upsert SMS_ENABLED "$SMS_ENABLED"
            upsert SOLAPI_API_KEY "$SOLAPI_API_KEY"
            upsert SOLAPI_API_SECRET "$SOLAPI_API_SECRET"
            upsert SOLAPI_SENDER "$SOLAPI_SENDER"

            sudo systemctl restart photo-submission
            sleep 5
            sudo systemctl is-active photo-submission
            echo "배포 완료: $(date)"
        env:
          SMS_ENABLED: ${{ vars.SMS_ENABLED }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER: ${{ vars.SOLAPI_SENDER }}
