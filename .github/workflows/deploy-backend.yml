name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {} # 수동 실행 허용

env:
  # 저장소 Variable(EC2_HOST)에 Elastic IP를 넣으면 IP 변경 시 코드 수정 불필요
  EC2_HOST: ${{ vars.EC2_HOST }}
  EC2_USER: ubuntu

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build bootJar
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: backend/build/libs/app.jar
          target: /home/ubuntu
          strip_components: 3

      - name: Deploy & restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            sudo mv /home/ubuntu/app.jar /opt/photo-submission/app.jar
            sudo systemctl restart photo-submission
            sleep 5
            sudo systemctl is-active photo-submission
            echo "배포 완료: $(date)"
