server:
  port: 8080

spring:
  application:
    name: photo-submission
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  # 기본 프로필: 로컬/데모용 H2 인메모리 DB (설정 없이 바로 실행 가능)
  datasource:
    url: jdbc:h2:mem:photodb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# 파일 저장 설정
app:
  upload:
    dir: ./uploads
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:4173"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

---
# 운영(EC2 + MySQL) 프로필: --spring.profiles.active=prod 로 실행
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:photodb}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect

app:
  upload:
    dir: ${UPLOAD_DIR:/var/app/uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-frontend.vercel.app}
